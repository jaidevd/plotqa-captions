<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlotCaptions QA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 900px;
      width: 100%;
    }
    h1 {
      margin-bottom: 1.5rem;
      color: #333;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .plot-image {
      width: 100%;
      max-height: 500px;
      object-fit: contain;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fafafa;
    }
    .caption-text {
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 1rem 0;
      padding: 1rem;
      background: #f9f9f9;
      border-left: 4px solid #666;
      border-radius: 0 4px 4px 0;
    }
    .meta {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1rem;
    }
    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    .actions button {
      flex: 1;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .actions button:hover { opacity: 0.85; }
    .actions button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-correct { background: #22c55e; color: #fff; }
    .btn-incorrect { background: #ef4444; color: #fff; }
    .btn-skip { background: #e5e7eb; color: #333; }
    .status {
      text-align: center;
      padding: 0.5rem;
      border-radius: 4px;
      font-weight: 600;
      margin-top: 0.75rem;
      display: none;
    }
    .status.show { display: block; }
    .status.ok { background: #dcfce7; color: #166534; }
    .status.fail { background: #fee2e2; color: #991b1b; }
    kbd {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      font-size: 0.75rem;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      margin-left: 0.3rem;
    }
    .loading {
      text-align: center;
      padding: 3rem;
      color: #888;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PlotCaptions QA</h1>
    <div class="card">
      <div id="loading" class="loading">Loading...</div>
      <div id="content" style="display:none">
        <img id="plot-img" class="plot-image" src="" alt="Plot image">
        <div class="meta">
          Doc ID: <span id="doc-id"></span> &middot;
          Image: <span id="img-idx"></span>
        </div>
        <div id="caption" class="caption-text"></div>
        <div class="actions">
          <button class="btn-correct" id="btn-correct" onclick="mark('correct')">Correct <kbd>C</kbd></button>
          <button class="btn-incorrect" id="btn-incorrect" onclick="mark('incorrect')">Incorrect <kbd>X</kbd></button>
          <button class="btn-skip" onclick="loadNext()">Skip <kbd>S</kbd></button>
        </div>
        <div id="status" class="status"></div>
      </div>
    </div>
  </div>

  <script>
    let currentDoc = null;

    async function loadDoc(docId) {
      const content = document.getElementById('content');
      const loading = document.getElementById('loading');
      const status = document.getElementById('status');
      content.style.display = 'none';
      loading.style.display = 'block';
      status.className = 'status';
      document.getElementById('btn-correct').disabled = false;
      document.getElementById('btn-incorrect').disabled = false;

      try {
        const res = await fetch(`/api/caption/${docId}`);
        if (!res.ok) throw new Error('Failed to fetch');
        currentDoc = await res.json();
        document.getElementById('plot-img').src = `/images/${currentDoc.image_index}.png`;
        document.getElementById('doc-id').textContent = currentDoc.id;
        document.getElementById('img-idx').textContent = currentDoc.image_index;
        document.getElementById('caption').textContent = currentDoc.caption;
        window.location.hash = currentDoc.id;
        loading.style.display = 'none';
        content.style.display = 'block';
      } catch (e) {
        loading.textContent = 'Document not found.';
      }
    }

    async function loadNext() {
      const content = document.getElementById('content');
      const loading = document.getElementById('loading');
      const status = document.getElementById('status');
      content.style.display = 'none';
      loading.style.display = 'block';
      status.className = 'status';

      document.getElementById('btn-correct').disabled = false;
      document.getElementById('btn-incorrect').disabled = false;

      try {
        const res = await fetch('/api/caption' + window.location.search);
        if (!res.ok) throw new Error('Failed to fetch');
        currentDoc = await res.json();

        document.getElementById('plot-img').src = `/images/${currentDoc.image_index}.png`;
        document.getElementById('doc-id').textContent = currentDoc.id;
        document.getElementById('img-idx').textContent = currentDoc.image_index;
        document.getElementById('caption').textContent = currentDoc.caption;
        window.location.hash = currentDoc.id;

        loading.style.display = 'none';
        content.style.display = 'block';
      } catch (e) {
        loading.textContent = 'Error loading caption. Retrying...';
        setTimeout(loadNext, 2000);
      }
    }

    async function mark(verdict) {
      if (!currentDoc) return;
      const status = document.getElementById('status');

      document.getElementById('btn-correct').disabled = true;
      document.getElementById('btn-incorrect').disabled = true;

      try {
        const res = await fetch(`/api/mark/${currentDoc.id}/${verdict}`, { method: 'POST' });
        if (!res.ok) throw new Error('Failed to mark');

        status.textContent = `Marked as ${verdict}`;
        status.className = `status show ${verdict === 'correct' ? 'ok' : 'fail'}`;

        const qcats = ['comparison', 'min_max'];
        const types = ['hbar', 'vbar'];
        const params = new URLSearchParams({
          qcat: qcats[Math.floor(Math.random() * qcats.length)],
          type: types[Math.floor(Math.random() * types.length)],
        });
        history.replaceState(null, '', '?' + params.toString() + window.location.hash);
        setTimeout(loadNext, 800);
      } catch (e) {
        status.textContent = 'Error saving verdict';
        status.className = 'status show fail';
        document.getElementById('btn-correct').disabled = false;
        document.getElementById('btn-incorrect').disabled = false;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'c' || e.key === 'C') mark('correct');
      else if (e.key === 'x' || e.key === 'X') mark('incorrect');
      else if (e.key === 's' || e.key === 'S') loadNext();
    });

    // Load a specific doc ID from the URL hash, or random
    const hashId = window.location.hash.replace('#', '');
    if (hashId) {
      loadDoc(parseInt(hashId, 10));
    } else {
      loadNext();
    }
  </script>
</body>
</html>
